name: Nightly Snapshot Dependency Test (1.x)

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  sbt:
    name: sbt test with latest pekko/pekko-main snapshots
    runs-on: ubuntu-latest
    if: github.repository == 'apache/pekko-grpc'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # we don't know what commit the last tag was it's safer to get entire repo so previousStableVersion resolves
          fetch-depth: 0
          ref: 1.2.x
          
      - name: Setup Java 8
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 8    

      - name: Install sbt
        uses: sbt/setup-sbt@06192244f17880c9bf69ccd8de5b2e8785822be5 # v1.1.17

      - name: Test
        run: |-
          cp .jvmopts-ci .jvmopts
          sbt -Dpekko.build.pekko.version=1.x -Dpekko.build.pekko.http.version=1.x test
